function useToast(){ const[t,setT]=useState(null); const show=m=>{setT(m);setTimeout(()=>setT(null),2600)}; return{t,show}; }
function useDark(){ const[d,setD]=useState(false); const tog=()=>{const n=!d;setD(n);document.documentElement.setAttribute("data-theme",n?"dark":"light")}; useEffect(()=>{document.documentElement.setAttribute("data-theme",d?"dark":"light")},[d]); return[d,tog]; }

// ── NOTIFICATION BELL ─────────────────────────────────────────
function NotifBell({ notifs, setNotifs, setPage }) {
  const [open,setOpen] = useState(false);
  const ref = useRef();
  useEffect(()=>{ const fn=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)}; document.addEventListener("mousedown",fn); return()=>document.removeEventListener("mousedown",fn); },[]);
  const unread = notifs.filter(n=>!n.read).length;
  const ico = t => t==="incasso"?"💳":t==="documento"?"📋":"📤";
  const click = n => { setNotifs(notifs.map(x=>x.id===n.id?{...x,read:true}:x)); setPage(n.pagina); setOpen(false); };
  return (
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={()=>setOpen(!open)} style={{background:"none",border:"none",cursor:"pointer",padding:6,borderRadius:8,color:"var(--mut)",fontSize:18,display:"flex",alignItems:"center",position:"relative"}}>
        🔔
        {unread>0 && <span style={{position:"absolute",top:-2,right:-2,background:"#dc3545",color:"#fff",fontSize:9,fontWeight:700,minWidth:15,height:15,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 2px"}}>{unread}</span>}
      </button>
      {open && (
        <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:"var(--sur)",border:"1px solid var(--bor)",borderRadius:12,boxShadow:"0 8px 28px rgba(0,0,0,.14)",width:310,zIndex:400,overflow:"hidden"}}>
          <div style={{padding:"10px 14px",borderBottom:"1px solid var(--bor)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12.5,fontWeight:500}}>Notifiche {unread>0&&<span style={{...C.bdg("#fce8e8","#b71c1c"),marginLeft:6}}>{unread} nuove</span>}</span>
            {unread>0 && <button onClick={()=>{setNotifs(notifs.map(n=>({...n,read:true})));setOpen(false)}} style={{background:"none",border:"none",color:H.accent,fontSize:11,fontWeight:500,cursor:"pointer"}}>Tutte lette</button>}
          </div>
          {notifs.map(n=>(
            <div key={n.id} onClick={()=>click(n)} style={{padding:"9px 14px",borderBottom:"1px solid var(--bor)",cursor:"pointer",background:n.read?"transparent":"#f7f9ff",borderLeft:n.read?"3px solid transparent":`3px solid ${H.color}`}}>
              <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                <span style={{fontSize:16,flexShrink:0}}>{ico(n.tipo)}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:n.read?400:600,color:"var(--txt)"}}>{n.titolo}</div>
                  <div style={{fontSize:11,color:"var(--mut)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.corpo}</div>
                  <div style={{fontSize:10,color:"var(--sub)",marginTop:2}}>{timeAgo(n.ts)}</div>
                </div>
                {!n.read && <div style={{width:7,height:7,borderRadius:"50%",background:H.accent,flexShrink:0,marginTop:4}} />}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── CAMBIO PASSWORD ───────────────────────────────────────────
function CambioPassword({ toast }) {
  const [old,setOld]=useState(""); const [nw,setNw]=useState(""); const [conf,setConf]=useState(""); const [str,setStr]=useState(0);
  const calc = v => { let n=0; if(v.length>=8)n++; if(/[0-9]/.test(v))n++; if(/[a-z]/.test(v))n++; if(/[A-Z]/.test(v))n++; if(/[@#$%!&]/.test(v))n++; return n; };
  const strCol = ["#bbb","#b71c1c","#a85e00","#a85e00","#c8932a","#1a6b2e"][str];
  const strLbl = ["","Molto debole","Debole","Discreta","Buona","Forte"][str];
  const rules = [["Almeno 8 caratteri",/^.{8,}/],["Un numero",/[0-9]/],["Lettera minuscola",/[a-z]/],["Lettera maiuscola",/[A-Z]/],["Simbolo (@#$%!&)",/[@#$%!&]/]];
  return (
    <div style={{maxWidth:480}}>
      <div style={{marginBottom:16}}><div style={{fontSize:18,fontWeight:600}}>Cambio Password</div><div style={{fontSize:12,color:"var(--mut)",marginTop:2}}>Modifica la password del tuo account</div></div>
      <div style={C.card}>
        <div style={C.cardHd}><span style={{fontSize:13,fontWeight:500}}>Cambio password — {ME.nome} {ME.cognome}</span></div>
        <div style={{padding:16,display:"flex",flexDirection:"column",gap:14}}>
          <div style={{background:"var(--bl)",borderLeft:`3px solid ${H.accent}`,borderRadius:"0 8px 8px 0",padding:"10px 13px"}}>
            <div style={{fontSize:11.5,fontWeight:600,marginBottom:6,color:"var(--txt)"}}>La password deve contenere:</div>
            {rules.map(([label,re])=>(
              <div key={label} style={{display:"flex",alignItems:"center",gap:6,fontSize:11.5,marginBottom:4,color:re.test(nw)?"#1a6b2e":"var(--mut)"}}>
                <span style={{fontSize:13}}>{re.test(nw)?"✅":"○"}</span> {label}
              </div>
            ))}
          </div>
          <div><label style={C.lbl}>Vecchia Password</label><input type="password" value={old} onChange={e=>setOld(e.target.value)} style={C.inp} placeholder="••••••••"/></div>
          <div>
            <label style={C.lbl}>Nuova Password</label>
            <input type="password" value={nw} onChange={e=>{setNw(e.target.value);setStr(calc(e.target.value))}} style={C.inp} placeholder="••••••••"/>
            {nw && <div style={{marginTop:6}}><div style={{height:4,borderRadius:2,background:"var(--bor)",overflow:"hidden"}}><div style={{height:"100%",width:`${(str/5)*100}%`,borderRadius:2,background:strCol,transition:"all .3s"}}/></div><div style={{fontSize:10,color:strCol,marginTop:3,fontWeight:500}}>{strLbl}</div></div>}
          </div>
          <div>
            <label style={C.lbl}>Conferma Nuova Password</label>
            <input type="password" value={conf} onChange={e=>setConf(e.target.value)} style={C.inp} placeholder="••••••••"/>
            {conf&&nw!==conf&&<div style={{fontSize:11,color:"#b71c1c",marginTop:3}}>Le password non corrispondono</div>}
            {conf&&nw===conf&&nw&&<div style={{fontSize:11,color:"#1a6b2e",marginTop:3}}>✓ Le password corrispondono</div>}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>{setOld("");setNw("");setConf("");setStr(0)}} style={C.btnOut}>Annulla</button>
            <button onClick={()=>{if(!old||!nw||nw!==conf||str<3){toast.show("Compila tutti i campi correttamente");return}toast.show("✓ Password aggiornata con successo")}} style={C.btn(H.color)}>Cambia Password</button>
          </div>
        </div>
      </div>
    </div>
  );
}
